</head>

    <div class="nb-shell">
        <header class="nb-card mb-5" style="background-color: var(--accent-yellow);">
            <div class="nb-sticker-circle pink nb-pulse" style="top: -10px; left: 40px;">♥</div>
            <span class="nb-chip nb-chip-pink">Groups</span>
            <div class="position-relative mt-3" style="z-index:2;">
                <h1>交流群汇总</h1>
                <p class="fs-5">加入兴趣社群 · 结识同好伙伴 · 获取最新资讯</p>
            </div>
            <div class="nb-sticker sticker-2">★</div>
        </header>

        <div class="nb-section">
            <span class="nb-title">搜索</span>
            <input type="text" id="searchInput" class="nb-input" placeholder="搜索群名称或描述...">
        </div>

        <div class="nb-section">
            <span class="nb-title">分类筛选</span>
            <div class="nb-filter-tags" id="filterTags"></div>
        </div>

        <div id="loadingState" class="nb-card" style="text-align: center; padding: 3rem;">
            <p>正在加载群组信息...</p>
        </div>

        <div id="groupsSection" style="display: none;"></div>

        <div id="noResults" class="nb-card" style="display: none; text-align: center; padding: 3rem;">
            <h3>未找到匹配的交流群</h3>
            <p>尝试调整搜索关键词或筛选条件</p>
        </div>

        <div class="nb-card mt-5" style="text-align: center; background: var(--accent-pink);">
            <p class="mb-2"><strong>群信息维护</strong> | 请通过官方表单提交更新</p>
            <a href="https://ecustcic.feishu.cn/share/base/form/shrcn5SJVIvKbkfDZxQsn0djtng" target="_blank" class="nb-btn primary">填写表单 →</a>
            <p class="mt-3 mb-0">本页信息由 <a href="https://www.ecustcic.com/" target="_blank" style="color: var(--ink); font-weight: 700;">CIC计算机信息交流协会</a> 提供</p>
        </div>

        <div id="copyNotification" class="nb-toast">已复制群号 <span id="copiedNumber"></span></div>
        <div class="nb-foot" id="footer"></div>
    </div>

    <script>
        const state = {
            searchQuery: '',
            selectedCategories: [],
            loading: true,
            categories: [
                { id: 'social', name: '友好社团' },
                { id: 'tech', name: '技术讨论' },
                { id: 'area', name: '区域性交流群' },
                { id: 'school', name: '学院群' },
                { id: 'game', name: '休闲娱乐' }
            ],
            groups: [],
            appId: 'cli_a8f1d48265fc500e',
            appSecret: 'u2NfRSgPlrI4KUhba3389eyj3LSa4aGR',
            accessToken: null
        };

        const elements = {
            searchInput: document.getElementById('searchInput'),
            filterTags: document.getElementById('filterTags'),
            loadingState: document.getElementById('loadingState'),
            groupsSection: document.getElementById('groupsSection'),
            noResults: document.getElementById('noResults'),
            copyNotification: document.getElementById('copyNotification'),
            copiedNumber: document.getElementById('copiedNumber')
        };

        function init() {
            renderCategoryTags();
            addEventListeners();
            fetchGroupsFromFeishu();
        }

        function renderCategoryTags() {
            state.categories.forEach(category => {
                const button = document.createElement('button');
                button.className = 'nb-filter-btn';
                button.dataset.categoryId = category.id;
                button.textContent = category.name;
                button.addEventListener('click', () => toggleCategory(category.id));
                elements.filterTags.appendChild(button);
            });
        }

        function addEventListeners() {
            elements.searchInput.addEventListener('input', () => {
                state.searchQuery = elements.searchInput.value;
                renderGroups();
            });
        }

        function toggleCategory(categoryId) {
            const index = state.selectedCategories.indexOf(categoryId);
            if (index === -1) state.selectedCategories.push(categoryId);
            else state.selectedCategories.splice(index, 1);
            updateCategoryButtons();
            renderGroups();
        }

        function updateCategoryButtons() {
            const buttons = elements.filterTags.querySelectorAll('button');
            buttons.forEach(button => {
                const categoryId = button.dataset.categoryId;
                if (state.selectedCategories.includes(categoryId)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        async function getTenantAccessToken() {
            try {
                const response = await fetch('https://feishuapi.bestzyq.cn/open-apis/auth/v3/tenant_access_token/internal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ app_id: state.appId, app_secret: state.appSecret })
                });
                const data = await response.json();
                if (data.code === 0) {
                    state.accessToken = data.tenant_access_token;
                    return data.tenant_access_token;
                }
                console.error('获取飞书访问令牌失败:', data);
                return null;
            } catch (error) {
                console.error('获取飞书访问令牌出错:', error);
                return null;
            }
        }

        async function fetchGroupsFromFeishu() {
            state.loading = true;
            let allGroups = [];
            let pageToken = null;
            let hasMore = true;
            try {
                const token = await getTenantAccessToken();
                if (!token) {
                    state.loading = false;
                    showError('获取飞书访问令牌失败');
                    return;
                }
                while (hasMore) {
                    let url = 'https://feishuapi.bestzyq.cn/open-apis/bitable/v1/apps/Y9HBbtQoxawALxs3XK8cOY9pn8g/tables/tblVq51wR2ZPVax4/records/search?page_size=100';
                    if (pageToken) url += `&page_token=${pageToken}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            sort: [{ field_name: '类别', desc: false }],
                            filter: { conjunction: 'and', conditions: [{ field_name: '是否可信', operator: 'is', value: ['true'] }] }
                        })
                    });
                    const data = await response.json();
                    if (data.code === 0) {
                        const pageGroups = data.data.items.map(item => {
                            const groupId = item.fields['QQ群号'];
                            const urlLink = (item.fields['加群链接'] && item.fields['加群链接'].link) || null;
                            let description = '暂无描述';
                            if (item.fields['描述'] && Array.isArray(item.fields['描述']) && item.fields['描述'].length > 0) {
                                description = item.fields['描述'].filter(desc => desc.type === 'text').map(desc => desc.text).join('');
                            }
                            let groupName = `群组(${groupId})`;
                            let apiSuccess = false;
                            if (item.fields['群名称'] && Array.isArray(item.fields['群名称']) && item.fields['群名称'].length > 0) {
                                const nameText = item.fields['群名称'].filter(name => name.type === 'text').map(name => name.text).join('');
                                if (nameText) { groupName = nameText; apiSuccess = true; }
                            }
                            let memberCount = 0;
                            let maxMemberCount = 0;
                            if (item.fields['群人数'] && Array.isArray(item.fields['群人数']) && item.fields['群人数'].length > 0) {
                                const countText = item.fields['群人数'].filter(count => count.type === 'text').map(count => count.text).join('');
                                if (countText) {
                                    const countMatch = countText.match(/\s*(\d+)\s*\/\s*(\d+)\s*/);
                                    if (countMatch) {
                                        memberCount = parseInt(countMatch[1], 10);
                                        maxMemberCount = parseInt(countMatch[2], 10);
                                        apiSuccess = apiSuccess && true;
                                    } else { apiSuccess = false; }
                                } else { apiSuccess = false; }
                            } else { apiSuccess = false; }
                            return {
                                group_id: String(groupId),
                                group_name: groupName,
                                description,
                                category: mapCategoryFromFeishu(item.fields['类别']),
                                url: urlLink,
                                api_success: apiSuccess,
                                member_count: memberCount,
                                max_member_count: maxMemberCount
                            };
                        });
                        allGroups = [...allGroups, ...pageGroups];
                        hasMore = data.data.has_more;
                        pageToken = data.data.page_token;
                        if (!hasMore || !pageToken) break;
                    } else {
                        console.error('获取飞书数据失败:', data);
                        hasMore = false;
                    }
                }
                state.groups = allGroups;
                state.loading = false;
                renderGroups();
            } catch (error) {
                console.error('获取群组信息出错:', error);
                state.loading = false;
                showError('获取群组信息失败');
            }
        }

        function mapCategoryFromFeishu(feishuCategory) {
            const categoryMap = {
                '学习交流': 'social',
                '休闲娱乐': 'game',
                '技术讨论': 'tech',
                '友好社团': 'social',
                '区域性交流群': 'area',
                '学院群': 'school'
            };
            return categoryMap[feishuCategory] || 'social';
        }

        function getFilteredGroups() {
            return state.groups.filter(group => {
                const searchMatch = group.group_name.toLowerCase().includes(state.searchQuery.toLowerCase()) ||
                    group.description.toLowerCase().includes(state.searchQuery.toLowerCase());
                const categoryMatch = state.selectedCategories.length === 0 || state.selectedCategories.includes(group.category);
                return searchMatch && categoryMatch;
            });
        }

        function getFilteredCategories() {
            const filteredGroups = getFilteredGroups();
            return state.categories.filter(cat => filteredGroups.some(group => group.category === cat.id));
        }

        function getGroupsByCategory(categoryId) {
            return getFilteredGroups().filter(group => group.category === categoryId);
        }

        function copyGroupNumber(number) {
            navigator.clipboard.writeText(number);
            showCopyNotification(number);
        }

        function showCopyNotification(number) {
            elements.copiedNumber.textContent = number;
            elements.copyNotification.classList.add('show');
            setTimeout(() => {
                elements.copyNotification.classList.remove('show');
            }, 2500);
        }

        function showError(message) {
            elements.loadingState.innerHTML = `<p style="color: var(--primary);">${message}</p>`;
        }

        function renderGroups() {
            const filteredGroups = getFilteredGroups();
            const filteredCategories = getFilteredCategories();
            elements.loadingState.style.display = 'none';

            if (filteredGroups.length === 0) {
                elements.groupsSection.style.display = 'none';
                elements.noResults.style.display = 'block';
            } else {
                elements.groupsSection.style.display = 'block';
                elements.noResults.style.display = 'none';
                elements.groupsSection.innerHTML = '';

                filteredCategories.forEach(category => {
                    const categoryGroups = getGroupsByCategory(category.id);
                    if (categoryGroups.length === 0) return;

                    const section = document.createElement('div');
                    section.className = 'nb-section';
                    section.innerHTML = `<span class="nb-title">${category.name} <span class="nb-chip nb-chip-blue" style="margin-left: 0.5rem;">${categoryGroups.length}</span></span>`;

                    const grid = document.createElement('div');
                    grid.className = 'nb-grid';

                    categoryGroups.forEach(group => {
                        const card = document.createElement('div');
                        card.className = 'nb-card nb-group-card';
                        card.innerHTML = `
                            <div class="nb-group-avatar">
                                <img src="https://p.qlogo.cn/gh/${group.group_id}/${group.group_id}/640" alt="${group.group_name}" onerror="this.src='https://qzonestyle.gtimg.cn/qzone/qzact/act/external/tiqq/logo.png'">
                            </div>
                            <div class="nb-group-info">
                                <h4>${group.group_name}</h4>
                                <p class="nb-group-id">${group.group_id}</p>
                                <p class="nb-group-desc">${group.description}</p>
                                ${group.api_success ? `<p class="nb-group-meta">${group.member_count}/${group.max_member_count} 人</p>` : ''}
                            </div>
                            <div class="nb-group-actions">
                                ${group.url ? `<a href="${group.url}" target="_blank" class="nb-btn primary">加入</a>` : ''}
                                <button class="nb-btn secondary btn-copy" data-group-id="${group.group_id}">复制群号</button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });

                    section.appendChild(grid);
                    elements.groupsSection.appendChild(section);
                });

                document.querySelectorAll('.btn-copy').forEach(button => {
                    button.addEventListener('click', () => {
                        copyGroupNumber(button.dataset.groupId);
                    });
                });
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
    <script src="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/popper.js/2.10.2/umd/popper.min.js"></script>
    <script src="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap/5.2.3/js/bootstrap.min.js"></script>

        const host = window.location.hostname;
        let footerContent = `© ${year} ECUST VR Club · Groups`;

            footerContent += ` · <a href="https://beian.miit.gov.cn/" target="_blank">苏ICP备2023000758号-2</a> · <a href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=31012102000135" target="_blank">沪公网安备31012102000135号</a> · <a href="https://cloud.tencent.com/product/teo" target="_blank">CDN by Tencent EdgeOne</a>`;
        }
        document.getElementById('footer').innerHTML = footerContent;
    </script>
</body>
