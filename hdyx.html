<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动影像 - VR俱乐部</title>
    <link rel="stylesheet" href="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap/5.2.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/brutal.css">
    <link rel="stylesheet" href="css/decorations.css">
</head>
<body>
    <nav class="nb-nav">
        <a class="navbar-brand" href="index.html">VR 俱乐部</a>
        <div class="d-flex flex-wrap gap-2">
            <a class="nav-link" href="about.html">社团简介</a>
            <a class="nav-link" href="history.html">发展历程</a>
            <a class="nav-link" href="cgzs.html">成果展示</a>
            <a class="nav-link active" href="hdyx.html">活动影像</a>
            <a class="nav-link" href="notice.html">使用攻略</a>
            <a class="nav-link" href="dh.html">网址导航</a>
            <a class="nav-link" href="qq-groups.html">交流群汇总</a>
            <a class="nav-link" target="_blank" href="https://wiki.ecustvr.top/">Wiki</a>
            <a class="nav-link" target="_blank" href="http://git.ecustvr.top/">Git</a>
        </div>
    </nav>

    <div class="nb-shell">
        <header class="nb-card mb-5">
            <div class="nb-sticker-tag pink" style="top: 5px; left: 20px; transform: rotate(-5deg);">ARCHIVE</div>
            <span class="nb-chip nb-chip-yellow">Archive</span>
            <div class="position-relative mt-3" style="z-index:2;">
                <h1>活动影像库</h1>
                <p class="fs-5">活动纪录、展览现场、幕后花絮，都在这里。支持预览图片/视频，文件按目录分页加载。</p>
            </div>
            <div class="nb-sticker sticker-2">★</div>
        </header>

        <div class="nb-section">
            <div class="d-flex flex-wrap align-items-center gap-3 mb-3">
                <span class="nb-breadcrumb" id="breadcrumb">活动影像</span>
                <button class="nb-btn secondary" onclick="resetPath()">回到根目录</button>
                <button class="nb-btn primary" onclick="goToParentFolder()">上一级</button>
            </div>
            <div id="loading-hint" class="nb-ghost">正在加载活动影像，请稍候...</div>
            <div id="file-container" class="nb-grid" style="margin-top:18px;">
                <!-- 动态加载 -->
            </div>
            <nav aria-label="文件导航" class="mt-4">
                <ul id="pagination" class="pagination justify-content-center"></ul>
            </nav>
        </div>

        <div class="nb-foot" id="footer"></div>
    </div>

    <script src="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/popper.js/2.10.2/umd/popper.min.js"></script>
    <script src="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap/5.2.3/js/bootstrap.min.js"></script>
    <script>
        // Alist API配置
        const alistConfig = {
            baseUrl: 'https://ss.bestzyq.cn', // 替换为你的Alist服务器地址
            path: '/VR',                    // 替换为你的活动影像文件夹路径
            password: '',                        // 如果需要密码，请在这里填写
            perPage: 12                          // 每页显示的文件数量
        };

        // 当前页码
        let currentPage = 1;

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 格式化日期
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN');
        }

        // 获取文件预览URL
        function getPreviewUrl(file) {
            return `${alistConfig.baseUrl}/d/Public${alistConfig.path}/${file.name}`;
        }

        // 获取文件缩略图URL和类型
        function getThumbnailInfo(file) {
            if (file.type === 1) {
                // 文件夹使用默认图标
                return {
                    url: 'https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap-icons/1.13.1/icons/folder.svg',
                    isIcon: true
                };
            }
            
            const ext = file.name.split('.').pop().toLowerCase();
            if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) {
                return {
                    url: `${alistConfig.baseUrl}/d/Public${alistConfig.path}/${file.name}`,
                    isIcon: false
                };
            }
            
            // 根据文件类型返回相应的图标
            if (['mp4', 'webm', 'mkv', 'avi', 'mov'].includes(ext)) {
                return {
                    url: 'https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap-icons/1.13.1/icons/file-play.svg',
                    isIcon: true
                };
            }
            if (['mp3', 'wav', 'ogg', 'flac'].includes(ext)) {
                return {
                    url: 'https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap-icons/1.13.1/icons/file-music.svg',
                    isIcon: true
                };
            }
            if (ext === 'pdf') {
                return {
                    url: 'https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap-icons/1.13.1/icons/file-pdf.svg',
                    isIcon: true
                };
            }
            if (['doc', 'docx'].includes(ext)) {
                return {
                    url: 'https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap-icons/1.13.1/icons/file-word.svg',
                    isIcon: true
                };
            }
            if (['xls', 'xlsx'].includes(ext)) {
                return {
                    url: 'https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap-icons/1.13.1/icons/file-excel.svg',
                    isIcon: true
                };
            }
            if (['ppt', 'pptx'].includes(ext)) {
                return {
                    url: 'https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap-icons/1.13.1/icons/file-ppt.svg',
                    isIcon: true
                };
            }
            if (['zip', 'rar', '7z', 'tar', 'gz'].includes(ext)) {
                return {
                    url: 'https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap-icons/1.13.1/icons/file-zip.svg',
                    isIcon: true
                };
            }
            
            // 其他文件类型使用默认图标
            return {
                url: 'https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap-icons/1.13.1/icons/file.svg',
                isIcon: true
            };
        }

        // 加载文件列表
        function loadFiles(page = 1) {
            currentPage = page;
            const container = document.getElementById('file-container');
            container.innerHTML = '';
            document.getElementById('loading-hint').style.display = 'block';
            
            const apiUrl = `${alistConfig.baseUrl}/api/fs/list`;
            const requestData = {
                path: alistConfig.path,
                password: alistConfig.password,
                page: page,
                per_page: alistConfig.perPage,
                refresh: false
            };
            
            fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.code !== 200) {
                    container.innerHTML = `<div class="nb-card nb-shadow-sm">加载失败：${data.message}</div>`;
                    return;
                }
                
                if (data.data.content === null) {
                    container.innerHTML = '<div class="nb-card nb-shadow-sm">暂无活动影像</div>';
                    return;
                }
                
                data.data.content.forEach(file => {
                    const isFolder = file.type === 1;
                    const fileUrl = isFolder ? '#' : getPreviewUrl(file);
                    const thumbnailInfo = getThumbnailInfo(file);
                    const imgClass = thumbnailInfo.isIcon ? 'file-type-icon' : 'img-fluid';
                    const imgStyle = thumbnailInfo.isIcon ? '' : 'max-height: 100%; max-width: 100%; object-fit: contain;';
                    
                    const fileCard = document.createElement('a');
                    fileCard.className = 'nb-card nb-shadow-sm nb-rotate file-card';
                    fileCard.href = isFolder ? 'javascript:void(0)' : fileUrl;
                    fileCard.target = isFolder ? '_self' : '_blank';
                    if (isFolder) fileCard.onclick = () => loadSubfolder(file.name);
                    fileCard.innerHTML = `
                        <div style="height: 180px; display:flex; align-items:center; justify-content:center; background:#fdf7ff; border: var(--border) dashed var(--ink); border-radius: var(--radius-md); margin-bottom:12px;">
                            <img src="${thumbnailInfo.url}" class="${imgClass}" style="${imgStyle}" alt="${file.name}">
                        </div>
                        <h5 class="text-truncate mb-1">${file.name}</h5>
                        <p class="mb-0"><small>${isFolder ? '文件夹' : formatFileSize(file.size)} · ${formatDate(file.modified)}</small></p>
                    `;
                    container.appendChild(fileCard);
                });
                
                // 更新分页
                updatePagination(data.data.total, page, alistConfig.perPage);
                
                // 移除加载提示
                document.getElementById('loading-hint').style.display = 'none';
            })
            .catch(error => {
                console.error('Error:', error);
                container.innerHTML = `<div class="nb-card nb-shadow-sm">加载失败：${error.message}</div>`;
            });
        }

        // 加载子文件夹
        function loadSubfolder(folderName) {
            alistConfig.path = `${alistConfig.path}/${folderName}`;
            loadFiles(1);
            
            // 更新面包屑导航
            updateBreadcrumb();
        }

        // 返回上级目录
        function goToParentFolder() {
            const pathParts = alistConfig.path.split('/').filter(p => p);
            pathParts.pop();
            alistConfig.path = '/' + pathParts.join('/');
            loadFiles(1);
            
            // 更新面包屑导航
            updateBreadcrumb();
        }

        // 更新面包屑导航
        function updateBreadcrumb() {
            const breadcrumbContainer = document.getElementById('breadcrumb');
            if (!breadcrumbContainer) return;
            
            const pathParts = alistConfig.path.split('/').filter(p => p);
            let html = '根目录';
            
            let currentPath = '';
            pathParts.forEach((part, index) => {
                currentPath += '/' + part;
                if (index === pathParts.length - 1) {
                    html += ` / ${part}`;
                } else {
                    html += ` / <a href="#" onclick="goToPath('${currentPath}'); return false;">${part}</a>`;
                }
            });
            
            breadcrumbContainer.innerHTML = html;
        }

        // 重置路径到根目录
        function resetPath() {
            alistConfig.path = '/VR';
            loadFiles(1);
            updateBreadcrumb();
        }

        // 跳转到指定路径
        function goToPath(path) {
            alistConfig.path = path;
            loadFiles(1);
            updateBreadcrumb();
        }

        // 更新分页
        function updatePagination(total, currentPage, perPage) {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(total / perPage);
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            
            // 上一页按钮
            html += `
                <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="loadFiles(${currentPage - 1}); return false;" aria-label="上一页">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
            `;
            
            // 页码按钮
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            
            if (endPage - startPage + 1 < maxVisiblePages) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }
            
            if (startPage > 1) {
                html += `
                    <li class="page-item">
                        <a class="page-link" href="#" onclick="loadFiles(1); return false;">1</a>
                    </li>
                `;
                
                if (startPage > 2) {
                    html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
                }
            }
            
            for (let i = startPage; i <= endPage; i++) {
                html += `
                    <li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="loadFiles(${i}); return false;">${i}</a>
                    </li>
                `;
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
                }
                
                html += `
                    <li class="page-item">
                        <a class="page-link" href="#" onclick="loadFiles(${totalPages}); return false;">${totalPages}</a>
                    </li>
                `;
            }
            
            // 下一页按钮
            html += `
                <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="loadFiles(${currentPage + 1}); return false;" aria-label="下一页">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            `;
            
            pagination.innerHTML = html;
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 添加Bootstrap图标
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css';
            document.head.appendChild(link);
            
            updateBreadcrumb();
            loadFiles();
        });

        const year = new Date().getFullYear();
        const host = window.location.hostname;
        let footerContent = `© ${year} ECUST VR Club · Archive`;
        if (host === 'www.ecustvr.top') {
            footerContent += ` · <a href="https://beian.miit.gov.cn/" target="_blank">苏ICP备2023000758号-2</a> · <a href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=31012102000135" target="_blank">沪公网安备31012102000135号</a> · <a href="https://cloud.tencent.com/product/teo" target="_blank">CDN by Tencent EdgeOne</a>`;
        }
        document.getElementById('footer').innerHTML = footerContent;
    </script>
</body>
