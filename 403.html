<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 禁止访问 - VR俱乐部</title>
    <link rel="stylesheet" href="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap/5.2.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/brutal.css">
</head>
<body>
    <div class="container nb-shell">
        <nav class="navbar navbar-expand-lg navbar-light nb-nav">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">VR Club</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="切换导航">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto gap-1">
                        <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
                        <li class="nav-item"><a class="nav-link" href="dh.html">网址导航</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="nb-hero mb-4">
            <div class="position-relative" style="z-index:2;">
                <span class="nb-badge">403</span>
                <h1>禁止访问</h1>
                <p>你的 IP 不在允许范围内，请连接校园网或使用 SSLVPN 后重试。</p>
            </div>
            <div class="nb-sticker">Access Denied</div>
        </div>

        <div class="nb-section">
            <div class="nb-form-card">
                <p class="mb-2">建议步骤：</p>
                <ul class="nb-list">
                    <li>连接校园网或校内运营商网络；</li>
                    <li>在校外使用 <a href="/vpn.html">VPN 链接转换器</a> 生成 SSLVPN 地址；</li>
                    <li>刷新当前页面再次尝试。</li>
                </ul>
                <p class="mt-3 mb-0"><strong>你的 IPv4/IPv6：</strong> <span id="ipv4"></span> <span id="ipv6"></span></p>
            </div>
        </div>

        <div class="nb-foot" id="footer"></div>
    </div>

    <script src="https://net.sjtu.edu.cn/script/jquery.min.js"></script>
    <script src="https://net.sjtu.edu.cn/script/nav.js"></script>
    <script>
        const year = new Date().getFullYear();
        const host = window.location.hostname;
        let footerContent = `© ${year} ECUST VR Club · Access`;
        if (host === 'www.ecustvr.top') {
            footerContent += ` · <a href="https://beian.miit.gov.cn/" target="_blank">苏ICP备2023000758号-2</a> · <a href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=31012102000135" target="_blank">沪公网安备31012102000135号</a> · <a href="https://cloud.tencent.com/product/teo" target="_blank">CDN by Tencent EdgeOne</a>`;
        }
        document.getElementById('footer').innerHTML = footerContent;
    </script>
    <script src="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/popper.js/2.10.2/umd/popper.min.js"></script>
    <script src="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/bootstrap/5.2.3/js/bootstrap.min.js"></script>
</body>
</html>
